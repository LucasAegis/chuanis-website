    <script>
        // 核心突破：摒弃 MD，直接将权利要求文本作为前端对象数据存储
        const claimsData = {
            "boundary": `
                <h1>一种信号结束边界的判定方法</h1>
                <p>&emsp;&emsp;<strong>1. 一种信号结束边界的判定方法</strong>，应用于一包含底层硬件采集单元与一逻辑控制单元的电子系统，其特征在于，所述判定方法包括以下步骤：</p>
                <p>&emsp;&emsp;a. 双轨计时启动：当所述底层硬件采集单元持续监测的外部物理特征进入一预设的静默状态范围时，所述底层硬件采集单元启动一内部的硬件超时计时，且所述逻辑控制单元同步启动一独立的最终确认计时；</p>
                <p>&emsp;&emsp;b. 硬件停工事件生成：当所述外部物理特征持续维持在所述静默状态范围内，且所述硬件超时计时达到一预设硬件超时时长时，所述底层硬件采集单元停止采集动作，以在所述电子系统内部生成一硬件停工事件；</p>
                <p>&emsp;&emsp;c. 逻辑最终裁决：所述逻辑控制单元在捕获到所述硬件停工事件，且自身所述独立的最终确认计时达到一预设最终确认时长后，执行对所述信号结束边界的最终界定。</p>
                <p>&emsp;&emsp;<strong>2. 根据权利要求1所述的判定方法</strong>，其特征在于，所述预设最终确认时长的时间值大于所述预设硬件超时时长的时间值。</p>
                <p>&emsp;&emsp;<strong>3. 根据权利要求1所述的判定方法</strong>，其特征在于，所述判定方法还包含一计时重置机制：在所述硬件超时计时或所述独立的最终确认计时未达到相应时长之前，若所述外部物理特征脱离所述静默状态范围，所述底层硬件采集单元与所述逻辑控制单元立刻终止并清零当前的计时动作，并恢复持续监测状态；仅当所述外部物理特征再次进入所述静默状态范围时，重新从零启动所述硬件超时计时与所述独立的最终确认计时。</p>
                <p>&emsp;&emsp;<strong>4. 根据权利要求1所述的判定方法</strong>，其特征在于，所述底层硬件采集单元在产生所述硬件停工事件后，执行一自动复位延时计时；当所述自动复位延时计时达到一复位时长后，所述底层硬件采集单元自动恢复至初始的监测状态；其中，所述复位时长的时间值大于所述预设最终确认时长的时间值与所述预设硬件超时时长的时间值之差，以使得所述底层硬件采集单元的恢复动作发生于所述逻辑控制单元执行完成所述最终界定之后。</p>
                <p>&emsp;&emsp;<strong>5. 根据权利要求1所述的判定方法</strong>，其特征在于，所述预设的静默状态范围被设定为一理论零值状态；所述理论零值状态用于表征所述外部物理特征在物理上完全消失，以作为判定所述信号结束边界的绝对物理基准。</p>
                <p>&emsp;&emsp;<strong>6. 一种信号结束边界的双轨判定系统</strong>，其特征在于，所述判定系统包括：一底层硬件采集单元，被配置为在监测到一外部物理特征进入一预设的静默状态范围时，启动一内部的硬件超时计时；并且，当所述外部物理特征持续维持在所述静默状态范围内，且所述硬件超时计时达到一预设硬件超时时长时，停止采集动作，以在所述判定系统内部生成一硬件停工事件；一逻辑控制单元，与所述底层硬件采集单元通信连接，被配置为在识别到所述外部物理特征进入所述静默状态范围时，同步启动一独立的最终确认计时；并且，在捕获到所述硬件停工事件，且自身所述独立的最终确认计时达到一预设最终确认时长后，执行对所述信号结束边界的最终界定。</p>
            `,
            "receive": `
                <h1>一种应用于第二系统的信号接收方法</h1>
                <p>&emsp;&emsp;<strong>1. 一种应用于第二系统的信号接收方法</strong>，其中，所述第二系统与一第一系统已建立物理接触以形成一物理接触界面信道；所述信号的接收由所述第二系统通过对所述信道上的物理特征进行持续监测与状态追踪来完成，并且所述接收过程发生于一个被独立界定的信号周期内；其特征在于，所述信号接收方法包括以下由所述第二系统自主执行的周期界定步骤：</p>
                <p>&emsp;&emsp;a. 周期起始锚定：当感应到的所述物理特征的值首次穿越并脱离一预设的初始稳定状态范围时，触发时间轴上的记录，将该物理脱离时刻界定为所述信号周期的开始；</p>
                <p>&emsp;&emsp;b. 周期终止裁决：自所述信号周期的开始之后，当感应到的所述物理特征的值进入一预设的最终静默状态范围，并持续保持在该最终静默状态范围内达到一最终确认时长时，将该持续静默达标时刻界定为所述信号周期的结束。</p>
                <p>&emsp;&emsp;<strong>2. 根据权利要求1所述的方法</strong>，其特征在于，在所述周期起始锚定步骤中，所述预设的初始稳定状态范围是通过以下步骤确立的：所述第二系统预存有一标准合法验证区间；当所述第二系统监测到信道上的物理特征的值落入并持续保持在所述标准合法验证区间之内时，表征感应到合法的信号；随后，所述第二系统提取该持续保持的物理特征的值作为恒定读数，并将该恒定读数的数据范围定义为所述预设的初始稳定状态范围。</p>
                <p>&emsp;&emsp;<strong>3. 根据权利要求1所述的方法</strong>，其特征在于，在所述周期终止裁决步骤中，所述信号周期结束的界定逻辑具体包括：所述第二系统在感应到所述物理特征的值进入所述最终静默状态范围后，触发一内部倒计时机制；当所述物理特征的值维持在所述最终静默状态范围内的时长达到一第一预设时长时，在所述第二系统内部生成一独立于所述物理特征的终止确认事件；所述第二系统基于对所述终止确认事件的捕获，确认达到所述最终确认时长，从而做出所述信号周期结束的最终界定。</p>
                <p>&emsp;&emsp;<strong>4. 根据权利要求3所述的方法</strong>，其特征在于，确认达到所述最终确认时长的逻辑包括：所述第二系统具有一底层硬件采集单元和一逻辑控制单元；所述底层硬件采集单元在所述物理特征的值进入所述最终静默状态范围时启动一硬件超时计时，并在超时后停止采集动作，以此状态翻转作为所述终止确认事件的生成；所述逻辑控制单元在识别到所述物理特征的值进入所述最终静默状态范围时，同步启动一独立的最终确认计时；所述逻辑控制单元在捕获到所述终止确认事件，且自身所述独立的最终确认计时达到该最终确认时长后，执行对所述信号周期结束的最终界定。</p>
                <p>&emsp;&emsp;<strong>5. 根据权利要求4所述的方法</strong>，其特征在于，确认达到所述最终确认时长的逻辑还包含一计时重置机制：在所述硬件超时计时或所述独立的最终确认计时未达到相应时长之前，若所述物理特征的值脱离所述最终静默状态范围，所述底层硬件采集单元与所述逻辑控制单元立刻终止并清零当前的计时动作，并恢复持续监测状态；仅当所述物理特征的值再次进入所述最终静默状态范围时，重新从零启动所述硬件超时计时与所述独立的最终确认计时。</p>
                <p>&emsp;&emsp;<strong>6. 根据权利要求4所述的方法，其特征在于，所述最终确认时长的时间值大于所述硬件超时计时的时间值。</p>
                <p>&emsp;&emsp;<strong>7. 根据权利要求4所述的方法，其特征在于，所述底层硬件采集单元在停止采集动作后，执行一自动复位延时计时；当所述自动复位延时计时达到一复位时长后，所述底层硬件采集单元自动恢复至初始的等待采集状态；其中，所述复位时长的时间值大于所述最终确认时长的时间值与所述硬件超时计时的时间值之差，以使得所述底层硬件采集单元的恢复动作发生于所述逻辑控制单元执行完成所述最终界定之后。</p>
            `,
            "interaction": `
                <h1>一种异步信息交互方法</h1>
                <p>&emsp;&emsp;<strong>1. 一种异步信息交互方法</strong>，应用于一第一系统与一第二系统；所述第一系统与所述第二系统建立物理接触以形成一物理接触界面信道；其特征在于，所述交互方法包括以下步骤：</p>
                <p>&emsp;&emsp;动作编码步骤：所述第一系统控制其内部的一开关单元执行一通断序列，以在所述物理接触界面信道上触发对应的物理特征变化；</p>
                <p>&emsp;&emsp;轨迹获取步骤：所述第二系统持续监测所述信道上的物理特征，获取发生于一个由所述第二系统独立界定的信号周期内的完整的感应数据轨迹；</p>
                <p>&emsp;&emsp;比对解码步骤：所述第二系统将所述完整的感应数据轨迹与所述第二系统内预存的一信息映射库进行比对，以解码出一唯一信息。</p>
                <p>&emsp;&emsp;<strong>2. 根据权利要求1所述的交互方法</strong>，其特征在于，所述动作编码步骤中，所述第一系统的内部架构及其触发机制具体包括：所述第一系统包含所述开关单元与一信号生成单元；所述开关单元的通断序列包含至少一次导通动作与至少一次断开动作；当所述开关单元执行所述导通动作时，驱动所述信号生成单元进入工作状态，以向所述信道输出具有一特定合法特征的信号；当所述开关单元执行所述断开动作时，所述信号生成单元停止输出信号；所述特定合法特征信号的交替输出与停止，共同构成所述触发的对应的物理特征变化。</p>
                <p>&emsp;&emsp;<strong>3. 根据权利要求1所述的交互方法</strong>，其特征在于，所述第二系统独立界定所述信号周期的逻辑具体包括：确立所述信号周期的开始：将所述第二系统感应到的所述物理特征的值首次脱离一预设的初始稳定状态范围的时刻，界定为所述信号周期的开始；确立所述信号周期的结束：自所述信号周期的开始之后，将所述第二系统感应到的所述物理特征的值进入并持续保持在一预设的最终静默状态范围内达到一最终确认时长的时刻，界定为所述信号周期的结束。</p>
                <p>&emsp;&emsp;<strong>4. 根据权利要求3所述的交互方法</strong>，其特征在于，所述完整的感应数据轨迹的获取逻辑为：在确立的所述信号周期的开始与所述信号周期的结束之间，所述物理特征所呈现的全部变化过程，被所述第二系统界定为该信号周期内的一个完整信号对象，并以该完整信号对象构成所述获取的完整的感应数据轨迹。</p>
                <p>&emsp;&emsp;<strong>5. 根据权利要求3所述的交互方法</strong>，其特征在于，在确立所述信号周期开始的步骤中，所述预设的初始稳定状态范围是通过以下步骤确立的：所述第二系统预存有一标准合法验证区间；当所述第二系统监测到信道上的物理特征的值落入并持续保持在所述标准合法验证区间之内时，表征感应到合法的信号；随后，所述第二系统提取该持续保持的物理特征的值作为恒定读数，并将该恒定读数的数据范围定义为所述预设的初始稳定状态范围。</p>
                <p>&emsp;&emsp;<strong>6. 根据权利要求3所述的交互方法，其特征在于，所述确立所述信号周期结束的判定逻辑具体包括：所述第二系统包含一底层硬件采集单元和一逻辑控制单元；当所述物理特征的感知值进入所述最终静默状态范围时，所述底层硬件采集单元启动一内部的硬件超时计时，且所述逻辑控制单元同步启动一独立的最终确认计时；当所述硬件超时计时达到一预设硬件超时时长时，所述底层硬件采集单元停止采集动作，以在所述第二系统内部生成一硬件停工事件；所述逻辑控制单元在捕获到所述硬件停工事件，且自身所述独立的最终确认计时达到所述最终确认时长后，执行对所述信号周期结束的最终界定；其中，所述最终确认时长的时间值大于所述预设硬件超时时长的时间值。</p>
                <p>&emsp;&emsp;<strong>7. 根据权利要求6所述的交互方法，其特征在于，所述确立所述信号周期结束的判定逻辑还包含一计时重置机制：在所述硬件超时计时或所述独立的最终确认计时未达到相应时长之前，若所述物理特征的感知值脱离所述最终静默状态范围，所述底层硬件采集单元与所述逻辑控制单元立刻终止并清零当前的计时动作，并恢复持续监测状态；仅当所述物理特征的感知值再次进入所述最终静默状态范围时，重新从零启动所述硬件超时计时与所述独立的最终确认计时。</p>
                <p>&emsp;&emsp;<strong>8. 根据权利要求6所述的交互方法，其特征在于，所述底层硬件采集单元在停止采集动作后，执行一自动复位延时计时；当所述自动复位延时计时达到一复位时长后，所述底层硬件采集单元自动恢复至初始的等待采集状态；其中，所述复位时长的时间值大于所述最终确认时长的时间值与所述预设硬件超时时长的时间值之差，以使得所述底层硬件采集单元的恢复动作发生于所述逻辑控制单元执行完成所述最终界定之后。</p>
                <p>&emsp;&emsp;<strong>9. 根据权利要求7所述的交互方法，其特征在于，所述第一系统执行开关单元的通断序列的过程受限于以下时序协同约束：所述通断序列包含导通动作，以及会导致所述物理特征的感知值落入所述最终静默状态范围的断开动作；当所述通断序列包含多次所述导通动作时，在任意相邻两次所述导通动作之间，所述开关单元处于所述断开动作的持续时长，被配置为小于所述预设硬件超时时长的时间值，以在所述硬件超时计时达到所述预设硬件超时时长前触发所述计时重置机制。</p>
                 <p>&emsp;&emsp;<strong>10. 根据权利要求1所述的交互方法，其特征在于，所述比对解码步骤的具体过程为：所述第二系统分析所述完整的感应数据轨迹，识别在所述信号周期内发生的物理特征变化中所呈现出的一系列离散事件；针对每一个所述离散事件，仅当其感知值的变化成功通过所述第二系统预存的一标准信号阈值的验证时，才将其计为一有效离散信号事件；所述第二系统累加所述信号周期内发生的所述有效离散信号事件的总次数值，并将该总次数值与所述信息映射库进行比对，以解码出该总次数值所对应的所述唯一信息。</p>
            ,
            "decode": `
                <h1>一种信息解码方法</h1>
                <p>&emsp;&emsp;<strong>1. 一种信息解码方法</strong>，应用于第二系统，其中，所述第二系统与一第一系统已建立物理接触以形成一物理接触界面信道；所述第二系统通过持续监测所述信道上的物理特征，感知发生于一个完整信号周期内的物理特征变化；</p>
                <p>&emsp;&emsp;其中，所述信号周期的开始，被界定为所述物理特征的感知值首次脱离一预设的初始稳定状态范围的时刻；并且，所述信号周期的结束，被界定为所述物理特征的感知值进入并持续保持在一预设的最终静默状态范围内达到一最终确认时长；其特征在于，所述信息解码方法基于该被界定的信号周期来执行，包括以下解码步骤：</p>
                <p>&emsp;&emsp;a. 特征提取：提取在所述信号周期的开始至结束期间，所述物理特征变化所呈现出的一目标特征参数；</p>
                <p>&emsp;&emsp;b. 映射解码：将所述目标特征参数与所述第二系统内预存的一信息映射库进行比对，所述信息映射库包含特征阈值范围与信息的对应关系；当所述目标特征参数落入所述信息映射库中的一目标特征阈值范围时，将该信号周期内发生的物理特征变化解码为该目标特征阈值范围所对应的唯一信息。</p>
                <p>&emsp;&emsp;<strong>2. 根据权利要求1所述的信息解码方法</strong>，其特征在于，所述预设的初始稳定状态范围是通过以下步骤确立的：所述第二系统预存有一标准合法验证区间；当所述第二系统监测到信道上的物理特征的值落入并持续保持在所述标准合法验证区间之内时，表征感应到合法的信号；随后，所述第二系统提取该持续保持的物理特征的值作为恒定读数，并将该恒定读数的数据范围定义为所述预设的初始稳定状态范围。</p>
                <p>&emsp;&emsp;<strong>3. 根据权利要求1所述的信息解码方法</strong>，其特征在于，所述信号周期结束的界定逻辑具体包括：所述第二系统具有一底层硬件采集单元和一逻辑控制单元；当所述物理特征的感知值进入所述最终静默状态范围时，所述底层硬件采集单元启动一内部的硬件超时计时，且所述逻辑控制单元同步启动一独立的最终确认计时；当所述硬件超时计时达到一预设硬件超时时长时，所述底层硬件采集单元停止采集动作，以在所述第二系统内部生成一硬件停工事件；所述逻辑控制单元在捕获到所述硬件停工事件，且自身所述独立的最终确认计时达到所述最终确认时长后，执行对所述信号周期结束的最终界定；其中，所述最终确认时长的时间值大于所述预设硬件超时时长的时间值。</p>
                <p>&emsp;&emsp;<strong>4. 根据权利要求1所述的信息解码方法</strong>，其特征在于，在所述特征提取步骤中，提取所述目标特征参数的具体过程为：识别在所述信号周期内发生的物理特征变化中所呈现出的一系列离散事件；针对每一个所述离散事件，仅当其感知值的变化成功通过一标准信号阈值的验证时，才将其计为一有效离散信号事件；累加所述信号周期内发生的所述有效离散信号事件的总次数值，并将该总次数值作为所述目标特征参数。</p>
                <p>&emsp;&emsp;<strong>5. 根据权利要求1所述的信息解码方法</strong>，其特征在于，在所述特征提取步骤中，提取所述目标特征参数的具体过程为：所述物理特征变化表现为从一初始状态向一目标状态完成一特定演变过程；测量完成该特定演变过程所消耗的时间值，并将该时间值作为所述目标特征参数。</p>
            `
        };

        const contentBox = document.getElementById('content-box');
        const navLinks = document.querySelectorAll('.sidebar-nav a');

        // 核心交互逻辑：点击左侧，瞬间注入内容，无视网络延迟
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); 
                
                // 1. 切换高亮状态
                navLinks.forEach(a => a.classList.remove('active'));
                this.classList.add('active');

                // 2. 获取数据键值并注入内容
                const key = this.getAttribute('data-key');
                contentBox.innerHTML = claimsData[key];
            });
        });

        // 页面加载完毕后，默认显示“信号结束边界”
        window.onload = () => {
            contentBox.innerHTML = claimsData['boundary'];
        };
    </script>
</body>
</html>
